specVersion: v2
specMinorVersion: 2
meta:
    name: nemotron-voice-agent
    image: project-nemotron-voice-agent
    description: Reference implementation of an end-to-end voice agent built using NVIDIA Nemotron models with ASR, TTS, and LLM NIM services.
    labels:
        - voice-agent
        - nemotron
        - nim
        - pipecat
        - asr
        - tts
    createdOn: "2026-03-04T21:00:00Z"
    defaultBranch: main
layout:
    - path: code/
      type: code
      storage: git
    - path: models/
      type: models
      storage: gitlfs
    - path: data/
      type: data
      storage: gitlfs
    - path: data/scratch/
      type: data
      storage: gitignore
environment:
    base:
        registry: nvcr.io
        image: nvidia/ai-workbench/python-basic:1.0.6
        build_timestamp: "20250205043314"
        name: Python Basic
        supported_architectures: []
        cuda_version: ""
        description: A Python Base with Jupyterlab
        entrypoint_script: ""
        labels:
            - ubuntu
            - python3
            - jupyterlab
        apps:
            - name: jupyterlab
              type: jupyterlab
              class: webapp
              start_command: jupyter lab --allow-root --port 8888 --ip 0.0.0.0 --no-browser --NotebookApp.base_url=\$PROXY_PREFIX --NotebookApp.default_url=/lab --NotebookApp.allow_origin='*'
              health_check_command: '[ \$(echo url=\$(jupyter lab list | head -n 2 | tail -n 1 | cut -f1 -d'' '' | grep -v ''Currently'' | sed "s@/?@/lab?@g") | curl -o /dev/null -s -w ''%{http_code}'' --config -) == ''200'' ]'
              stop_command: jupyter lab stop 8888
              user_msg: ""
              logfile_path: ""
              timeout_seconds: 60
              icon_url: ""
              webapp_options:
                autolaunch: true
                port: "8888"
                proxy:
                    trim_prefix: false
                url_command: jupyter lab list | head -n 2 | tail -n 1 | cut -f1 -d' ' | grep -v 'Currently'
        programming_languages:
            - python3
        icon_url: https://workbench.download.nvidia.com/static/img/ai-workbench-icon-rectangle.jpg
        image_version: 1.0.6
        os: linux
        os_distro: ubuntu
        os_distro_release: "22.04"
        schema_version: v2
        user_info:
            uid: ""
            gid: ""
            username: ""
        package_managers:
            - name: apt
              binary_path: /usr/bin/apt
              installed_packages:
                - curl
                - git
                - git-lfs
                - python3
                - gcc
                - python3-dev
                - python3-pip
                - vim
            - name: pip
              binary_path: /usr/bin/pip
              installed_packages:
                - jupyterlab==4.2.5
        package_manager_environment:
            name: ""
            target: ""
    compose_file_path: docker-compose.yml
execution:
    apps:
        - name: Voice Agent UI
          type: custom
          class: webapp
          start_command: docker compose up -d
          health_check_command: curl -f http://localhost:9000 || exit 1
          stop_command: docker compose down
          user_msg: "Starts the full voice agent stack (ASR, TTS, LLM NIMs + app + UI). Requires NVIDIA_API_KEY secret."
          logfile_path: ""
          timeout_seconds: 3600
          icon_url: ""
          webapp_options:
            autolaunch: true
            port: "9000"
            proxy:
                trim_prefix: false
            url: http://localhost:9000
        - name: Voice Agent API
          type: custom
          class: webapp
          start_command: docker compose up -d python-app
          health_check_command: curl -f http://localhost:7860/docs || exit 1
          stop_command: docker compose stop python-app
          user_msg: "The Pipecat voice agent API endpoint."
          logfile_path: ""
          timeout_seconds: 3600
          icon_url: ""
          webapp_options:
            autolaunch: false
            port: "7860"
            proxy:
                trim_prefix: false
            url: http://localhost:7860
    resources:
        gpu:
            requested: 1
        sharedMemoryMB: 16384
    secrets:
        - variable: NVIDIA_API_KEY
          description: "NVIDIA API key for NGC / NIM services (from build.nvidia.com)"
    mounts:
        - type: project
          target: /project/
          description: Project directory
          options: rw
